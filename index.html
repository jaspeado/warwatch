<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>WarWatch - Línea del Frente</title>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 8px;
            text-align: center;
        }
        #loading span {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="loading">⏳ Cargando...</div>
    <div id="info">🌍 WarWatch - Línea del Frente</div>
    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />

    <script>
        const DEEPSTATE_URL = 'https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/deepstate-map-data.geojson.gz';

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'osm': {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256
                    }
                },
                layers: [
                    { id: 'osm-layer', type: 'raster', source: 'osm' }
                ]
            },
            center: [31.0, 48.5],
            zoom: 6,
            pitch: 0
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
        script.onload = function() {
            fetch(DEEPSTATE_URL)
                .then(r => r.arrayBuffer())
                .then(buffer => {
                    const data = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
                    const geojson = JSON.parse(data);
                    const features = geojson.features || [];
                    console.log('📊 DeepState:', features.length);

                    const fechas = new Set();
                    features.forEach(f => {
                        const d = f.properties?.date || '';
                        if (d) fechas.add(d);
                    });
                    const fechasOrdenadas = Array.from(fechas).sort();
                    const ultimaFecha = fechasOrdenadas[fechasOrdenadas.length - 1] || '';
                    console.log('📅 Última fecha:', ultimaFecha);

                    const filtered = features.filter(f =>
                        (f.properties?.date || '') === ultimaFecha
                    );
                    console.log('📊 Polígonos:', filtered.length);

                    map.on('load', function() {
                        map.addSource('deepstate', {
                            type: 'geojson',
                            data: {
                                type: 'FeatureCollection',
                                features: filtered
                            }
                        });

                        map.addLayer({
                            id: 'deepstate-fill',
                            type: 'fill',
                            source: 'deepstate',
                            paint: {
                                'fill-color': '#FF0000',
                                'fill-opacity': 0.5,
                                'fill-outline-color': '#FFFFFF',
                                'fill-outline-width': 1
                            }
                        });

                        map.addLayer({
                            id: 'deepstate-line',
                            type: 'line',
                            source: 'deepstate',
                            paint: {
                                'line-color': '#FFFFFF',
                                'line-width': 2,
                                'line-opacity': 1.0
                            }
                        });

                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('info').textContent =
                            '🌍 WarWatch | ' + filtered.length + ' polígonos | ' + ultimaFecha;

                        console.log('✅ DeepState dibujado');
                    });
                })
                .catch(e => {
                    console.error('❌ Error:', e);
                    document.getElementById('loading').textContent = '❌ Error: ' + e.message;
                });
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
