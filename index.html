<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>WarWatch - Prueba de Relleno</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">🧪 Prueba: Polígono manual (debería verse rojo)</div>
    <div id="map"></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'osm': {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256
                    }
                },
                layers: [
                    { id: 'osm-layer', type: 'raster', source: 'osm' }
                ]
            },
            center: [31.0, 48.5],
            zoom: 5,
            pitch: 0
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        map.on('load', function() {
            // Polígono de prueba (un cuadrado en Ucrania)
            const polygon = {
                "type": "Feature",
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [30.0, 48.0],
                        [32.0, 48.0],
                        [32.0, 49.0],
                        [30.0, 49.0],
                        [30.0, 48.0]
                    ]]
                }
            };

            map.addSource('test', {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: [polygon]
                }
            });

            // Relleno rojo
            map.addLayer({
                id: 'test-fill',
                type: 'fill',
                source: 'test',
                paint: {
                    'fill-color': '#FF0000',
                    'fill-opacity': 0.7,
                    'fill-outline-color': '#FFFFFF',
                    'fill-outline-width': 2
                }
            });

            // Borde blanco
            map.addLayer({
                id: 'test-line',
                type: 'line',
                source: 'test',
                paint: {
                    'line-color': '#FFFFFF',
                    'line-width': 3,
                    'line-opacity': 1.0
                }
            });

            // Forzar capa por encima
            map.moveLayer('test-fill', 'osm-layer');
            map.moveLayer('test-line', 'osm-layer');

            document.getElementById('info').textContent =
                '✅ Polígono de prueba dibujado (rojo) - ¿Lo ves?';
        });
    </script>
</body>
</html>
