<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>WarWatch - Línea del Frente</title>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 8px;
            text-align: center;
        }
        #loading span {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="loading">⏳ Cargando DeepState...<span>Descargando 17 MB</span></div>
    <div id="info">🌍 WarWatch - Línea del Frente</div>
    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.js">
    </script>
    <link href="https://unpkg.com/maplibre-gl@4.0.2/dist/maplibre-gl.css" rel="stylesheet" />

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const DEEPSTATE_URL = 'https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/deepstate-map-data.geojson.gz';

        // ============================================================
        // MAPA
        // ============================================================
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'osm': {
                        type: 'raster',
                        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256
                    }
                },
                layers: [
                    { id: 'osm-layer', type: 'raster', source: 'osm' }
                ]
            },
            center: [31.0, 48.5],
            zoom: 6,
            pitch: 0
        });

        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ============================================================
        // FUNCIÓN PARA SIMPLIFICAR POLÍGONOS
        // ============================================================
        function simplifyPolygon(coordinates, tolerance = 0.001) {
            // Simplificación básica: reducir puntos
            if (!coordinates || coordinates.length === 0) return coordinates;
            if (coordinates.length < 10) return coordinates;
            
            const simplified = [];
            const step = Math.max(1, Math.floor(coordinates.length / 50));
            for (let i = 0; i < coordinates.length; i += step) {
                simplified.push(coordinates[i]);
            }
            // Asegurar que el último punto se incluye
            if (simplified[simplified.length - 1] !== coordinates[coordinates.length - 1]) {
                simplified.push(coordinates[coordinates.length - 1]);
            }
            return simplified;
        }

        function simplifyFeature(feature) {
            if (!feature.geometry) return feature;
            const geom = feature.geometry;
            if (geom.type === 'Polygon') {
                geom.coordinates = geom.coordinates.map(ring => simplifyPolygon(ring));
            } else if (geom.type === 'MultiPolygon') {
                geom.coordinates = geom.coordinates.map(polygon => 
                    polygon.map(ring => simplifyPolygon(ring))
                );
            }
            return feature;
        }

        // ============================================================
        // CARGAR DEEPSTATE
        // ============================================================
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
        script.onload = function() {
            fetch(DEEPSTATE_URL)
                .then(r => r.arrayBuffer())
                .then(buffer => {
                    const data = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
                    const geojson = JSON.parse(data);
                    let features = geojson.features || [];
                    console.log('📊 DeepState original:', features.length, 'polígonos');

                    // Obtener la fecha más reciente
                    const fechas = new Set();
                    features.forEach(f => {
                        const d = f.properties?.date || '';
                        if (d) fechas.add(d);
                    });
                    const fechasOrdenadas = Array.from(fechas).sort();
                    const ultimaFecha = fechasOrdenadas[fechasOrdenadas.length - 1] || '';
                    console.log('📅 Última fecha:', ultimaFecha);

                    // Filtrar por fecha
                    features = features.filter(f =>
                        (f.properties?.date || '') === ultimaFecha
                    );
                    console.log('📊 Polígonos para', ultimaFecha, ':', features.length);

                    // SIMPLIFICAR polígonos (reducir puntos)
                    features = features.map(simplifyFeature);
                    console.log('📊 Polígonos simplificados');

                    map.on('load', function() {
                        map.addSource('deepstate', {
                            type: 'geojson',
                            data: {
                                type: 'FeatureCollection',
                                features: features
                            }
                        });

                        // SOLO BORDE (más ligero y visible)
                        map.addLayer({
                            id: 'deepstate-line',
                            type: 'line',
                            source: 'deepstate',
                            paint: {
                                'line-color': '#FF0000',
                                'line-width': 3,
                                'line-opacity': 1.0,
                                'line-dasharray': [2, 2]
                            }
                        });

                        // Relleno con opacidad baja
                        map.addLayer({
                            id: 'deepstate-fill',
                            type: 'fill',
                            source: 'deepstate',
                            paint: {
                                'fill-color': '#FF0000',
                                'fill-opacity': 0.2,
                                'fill-outline-color': '#FFFFFF',
                                'fill-outline-width': 1
                            }
                        });

                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('info').textContent =
                            '🌍 WarWatch | ' + features.length + ' polígonos | ' + ultimaFecha;

                        console.log('✅ DeepState dibujado correctamente');
                    });
                })
                .catch(e => {
                    console.error('❌ Error:', e);
                    document.getElementById('loading').innerHTML =
                        '❌ Error: ' + e.message + '<br><span>Reintentando...</span>';
                    setTimeout(() => location.reload(), 5000);
                });
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
